<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Calculator</title>
    <link rel="icon" type="image/png" href="./icons/favicon.png">
    <link rel="apple-touch-icon" href="./icons/app-icon.png">
    <meta name="theme-color" content="#0f172a">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background-blur"></div>

<div class="calculator">

    <div class="display">
        <div id="history"></div>
        <input type="text" id="result" value="0" readonly>
    </div>

    <div class="buttons">
        <button class="function" data-value="AC">AC</button>
        <button class="function" data-value="DEL">⌫</button>
        <button class="operator" data-value="%">%</button>
        <button class="operator" data-value="/">÷</button>

        <button data-value="7">7</button>
        <button data-value="8">8</button>
        <button data-value="9">9</button>
        <button class="operator" data-value="*">×</button>

        <button data-value="4">4</button>
        <button data-value="5">5</button>
        <button data-value="6">6</button>
        <button class="operator" data-value="-">−</button>

        <button data-value="1">1</button>
        <button data-value="2">2</button>
        <button data-value="3">3</button>
        <button class="operator" data-value="+">+</button>

        <button class="zero" data-value="0">0</button>
        <button data-value=".">.</button>
        <button class="equal" data-value="=">=</button>
    </div>

</div>

<audio id="clickSound" src="sounds/click.wav"></audio>

<script src="script.js"></script>
</body>
</html>
